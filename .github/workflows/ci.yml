name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff

      - name: Run ruff check
        run: |
          ruff check src/ tests/

      - name: Run ruff format check
        run: |
          ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install cloudscraper tenacity pytest pytest-cov sqlalchemy pyyaml python-dotenv requests

      - name: Run tests
        run: |
          pytest tests/ -v

  list:
    name: List Code
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: List source files
        run: |
          echo "=== Source Files ==="
          find src -name "*.py" -type f | sort
          echo ""
          echo "=== Test Files ==="
          find tests -name "*.py" -type f | sort
